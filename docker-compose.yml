
services:
  postgres:
    image: postgres:15
    container_name: taskflow_db
    restart: always
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    # ✅ Healthcheck (ensures DB is actually ready)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: taskflow_server
    restart: always
    ports:
      - "5000:5000"

    # ✅ Wait for DB readiness
    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - ./server/.env

    stdin_open: true
    tty: true

  # 🔥 NEW: FRONTEND (NGINX)
  client:
    build: ./client
    container_name: taskflow_client
    restart: always
    ports:
      - "3000:80"

    depends_on:
      - server

    # optional but useful for logs/debug
    stdin_open: true
    tty: true

volumes:
  pgdata: